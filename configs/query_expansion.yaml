# configs/query_expansion.yaml — クエリ展開パターン設定
#
# patterns:
#   各パターンは正規表現。キャプチャグループ（）が展開後のサブクエリになる。
#   _is_particle() で除外されるグループ（比較・助詞・動詞）は自動的に無視される。
#
# negative_signals:
#   LLM 出力にこれらの文字列が含まれていた場合、リトライをトリガーする。
#
# max_expanded:
#   展開後の最大クエリ数（元クエリを含む合計）。
#
# retry_max_results_per_query:
#   リトライ時、展開クエリ1件あたりの RAG 検索数。

# ── 展開パターン ──────────────────────────────────────────────────
# 優先順位: 上のパターンが先にマッチした場合、それ以降はスキップされる。
# 具体的・限定的なパターンを上に、汎用パターンを下に配置すること。
patterns:
  # ────────────────────────────────────────────────────────────────
  # 日本語: 「X とは ... Y との違い/比較」形（最優先）
  #   例: "TinyLoRA とはどのような技術ですか？通常の LoRA との違いを教えてください"
  #       → group1="TinyLoRA", group2="LoRA"
  #   ※ \s*との で "LoRA との" のスペースを許容
  # ────────────────────────────────────────────────────────────────
  toha_difference_ja: '(\S+)\s*とは.*?(\S+)\s*との(?:違い|比較|差異)'

  # 日本語: 「X について ... Y との違い/比較」形
  #   例: "Transformerについて、CNNとの違いを教えて"
  #       → group1="Transformer", group2="CNN"
  #   ※ \s*との で "CNN との" のスペースを許容
  about_difference_ja: '(\S+)について.*?(\S+)\s*との(?:違い|比較|差異)'

  # ────────────────────────────────────────────────────────────────
  # 日本語: AとBの比較 / AとBの違い / AとBの差（単純形）
  #   例: "TinyLoRAとLoRAの比較"
  #   ※ 上記2パターンにマッチしなかった場合のみ到達
  # ────────────────────────────────────────────────────────────────
  comparison_ja:    '(\S+)と(\S+)の(比較|違い|差|差異|相違|difference)'

  # 日本語: AとBを比べる
  compare_verb_ja:  '(\S+)と(\S+)(?:を比べ|を比較)'

  # 日本語: A対B / A vs B（日本語混在）
  versus_ja:        '(\S+)(?:対|vs|VS)(\S+)'

  # 英語: A vs B / A versus B
  versus_en:        '(\S+)\s+(?:vs\.?|versus)\s+(\S+)'

  # 英語: A and B comparison / A and B difference
  comparison_en:    '(\S+)\s+and\s+(\S+)\s+(?:comparison|difference|differences|compare)'

  # 日本語: AとBの組み合わせ / AとBの統合 / AとBの連携
  combined_ja:      '(\S+)と(\S+)(?:の組み合わせ|の統合|の連携|を組み合わせ)'

  # 英語: A using B for C / A with B for C
  using_en:         '(\S+)\s+(?:using|with)\s+(\S+)\s+(?:for|to|in)\s'

  # 日本語: AによるB
  method_ja:        '(\S+)による(\S+)'

# ── ネガティブシグナル ────────────────────────────────────────────
# これらが LLM 回答に含まれていた場合、リトライをトリガーする
negative_signals:
  # 日本語
  - "見つかりません"
  - "情報がありません"
  - "不明です"
  - "わかりません"
  - "詳細は不明"
  - "資料が見当たらない"
  - "ドキュメントが見つからない"
  - "コンテキストには含まれていません"
  - "提供されたコンテキスト"
  - "提供された文脈"
  - "言及されていません"
  - "記載がありません"
  # English
  - "couldn't find"
  - "could not find"
  - "no information"
  - "not found"
  - "i don't have"
  - "i do not have"
  - "i couldn't find"
  - "no relevant"
  - "unable to find"
  - "no documents"
  - "not mentioned"
  - "no context"
  - "context does not"
  - "context doesn't"

# ── 制御パラメータ ────────────────────────────────────────────────
# 展開後の最大クエリ数（元クエリ + サブクエリの合計上限）
max_expanded: 3

# リトライ時に展開クエリ1件あたり取得する RAG 結果数
retry_max_results_per_query: 5

# FAISS 結果がこの件数未満 かつ クエリが複合形（expand が新クエリを生成）の場合、
# LLM 回答の内容によらず CRAG リトライをトリガーする。
# 0 に設定すると FAISS スパース判定を無効化し、is_negative のみでトリガーする。
crag_min_faiss: 2
