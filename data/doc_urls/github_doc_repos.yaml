# GitHub ドキュメントリポジトリ設定
# GitHubDocsFetcher が読み込む
# rate: 1 req/sec (GitHub Contents API: 5,000/hr)

repos:

  # ── Linux コマンドリファレンス（tldr-pages: 実用Markdown）──────────────
  - repo: tldr-pages/tldr
    label: "tldr-pages Linux"
    paths:
      - pages/linux
      - pages/common
    ref: main
    extensions: [".md"]
    max_files: 200
    enabled: true

  # ── Node.js API ドキュメント ───────────────────────────────────────────
  - repo: nodejs/node
    label: "Node.js API"
    paths:
      - doc/api
    ref: main
    extensions: [".md"]
    max_files: 80
    enabled: true

  # ── Python 標準ライブラリドキュメント（RST）───────────────────────────
  - repo: python/cpython
    label: "Python stdlib docs"
    paths:
      - Doc/library
    ref: "3.12"      # バージョン固定
    extensions: [".rst"]
    max_files: 100
    enabled: true

  # ── JavaScript リファレンス（MDN content）────────────────────────────
  # パスが深いため対象サブディレクトリを限定する
  - repo: mdn/content
    label: "MDN JavaScript"
    paths:
      - files/en-us/web/javascript/reference/global_objects
      - files/en-us/web/javascript/reference/statements
      - files/en-us/web/javascript/reference/operators
    ref: main
    extensions: [".md"]
    max_files: 120
    enabled: true

  # ── CSS リファレンス（MDN content）───────────────────────────────────
  - repo: mdn/content
    label: "MDN CSS"
    paths:
      - files/en-us/web/css
    ref: main
    extensions: [".md"]
    max_files: 60
    enabled: false    # 初回は無効、有効化して追加可能

  # ── Python PEPs ───────────────────────────────────────────────────────
  - repo: python/peps
    label: "Python PEPs"
    paths:
      - peps
    ref: main
    extensions: [".rst"]
    max_files: 50
    enabled: false    # 初回は無効、重要PEPのみ手動追加を推奨
