app:
  name: "rag-faiss-llm"
  version: "0.4.0"
  debug: false
  host: "0.0.0.0"
  port: 8000
  log_level: "INFO"

embedding:
  model: "all-MiniLM-L6-v2"
  dim: 384
  batch_size: 64
  device: "cpu"
  cache_dir: "data/models"

gui:
  host: "0.0.0.0"
  port: 7860
  share: false
  debug: false
  orchestrator_url: "http://localhost:8000"

auth:
  users_db_path: "data/users.db"
  jwt_secret_key: "change-me-in-production"  # 本番: 環境変数 JWT_SECRET_KEY で上書き
  jwt_algorithm: "HS256"
  access_token_expire_days: 7
  allow_test_token: true         # 本番環境では false に設定
  test_token_localhost_only: true
  allow_registration: true

conversation:
  db_path: "data/conversations.db"
  context_window_tokens: 2048
  auto_save_to_faiss: true
  max_sessions_per_user: 50
  max_turns_per_session: 500
  user_faiss_base: "data/faiss_indices/user_{user_id}"
  knowledge_faiss_base: "data/faiss_indices/knowledge"

rag:
  faiss_k: 5          # FAISS 近傍検索数。推奨範囲: 3〜5（ICL Bayesian収束理論: k=3〜5 で指数収束）

knowledge_graph:
  backend: "networkx"              # "networkx" (default) or "neo4j"
  # Neo4j 設定（backend: neo4j 時のみ使用）
  neo4j:
    uri: "bolt://localhost:7687"
    auth: ["neo4j", "neo4j"]
    database: "neo4j"
