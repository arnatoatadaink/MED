max_results_per_source: 5
timeout_seconds: 30
verify_results: true
chunk_size: 1500       # 段落・文境界優先分割のため拡大（旧: 512）
chunk_overlap: 100
min_chunk_len: 100     # この文字数未満の断片を除外

# ── Seed 品質フィルタ ──────────────────────────────────
seed_filters:
  # ドメイン関連性: クエリとコンテンツの cosine similarity 閾値
  # この値未満の結果は除外する
  relevance_threshold: 0.25

  # 最小コンテンツ品質フィルタ（デフォルト OFF）
  # ON にすると、コードブロックを含まない短いコンテンツを除外する
  min_quality_filter:
    enabled: false
    min_length: 500       # コード無しの場合に要求する最小文字数
    # コードを含む場合はこの制限を免除する

sources:
  github:
    enabled: true
    max_results: 5
    search_code: true
    search_repos: true

  stackoverflow:
    enabled: true
    max_results: 5
    min_answer_score: 1     # 回答の最低スコア（accepted は免除）
    prefer_accepted: true   # accepted answer を優先する

  tavily:
    enabled: true
    max_results: 5
    search_depth: "advanced"
    include_raw_content: true   # 全文取得（断片化防止）

  arxiv:
    enabled: true
    max_results: 3
    categories:
      - "cs.AI"
      - "cs.LG"
      - "cs.CL"
      - "cs.IR"
      - "cs.DB"
      - "stat.ML"
