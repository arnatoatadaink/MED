name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]

# 同一ブランチの古いワークフローをキャンセル
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: med-test

jobs:
  # ──────────────────────────────────────────────────────────────
  # 1. Lint (ruff)
  # ──────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install "ruff>=0.3.0"

      - name: Run ruff
        run: ruff check src/ tests/

  # ──────────────────────────────────────────────────────────────
  # 2. Unit Tests (Docker 不要・高速)
  # ──────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install faiss-cpu aiosqlite pyyaml httpx networkx docker
          # sentence-transformers は除外（tests/unit は mock=True で動作するため PyTorch 不要）

      - name: Run unit tests
        run: |
          pytest tests/unit/ \
            -v \
            --tb=short \
            --no-header \
            -p no:warnings \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-unit
          path: coverage.xml
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # 3. Docker Tests (Dockerfile.test でビルド + 実行)
  # ──────────────────────────────────────────────────────────────
  docker-tests:
    name: Docker Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      # Docker Buildx セットアップ（キャッシュ活用）
      - uses: docker/setup-buildx-action@v3

      # Dockerfile.test イメージをビルド（レイヤーキャッシュ）
      - name: Build test image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.test
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Docker-in-Docker でサンドボックス統合テストを実行
      - name: Run Docker integration tests
        run: |
          docker run --rm \
            --name med-docker-tests \
            -v /var/run/docker.sock:/var/run/docker.sock \
            ${{ env.IMAGE_NAME }}:latest \
            pytest tests/integration/ \
              -v \
              --tb=short \
              -m docker \
              -p no:warnings

      - name: Upload Docker test coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-docker
          path: reports/coverage.xml
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # 4. Summary
  # ──────────────────────────────────────────────────────────────
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, docker-tests]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "=== CI Results ==="
          echo "lint:         ${{ needs.lint.result }}"
          echo "unit-tests:   ${{ needs.unit-tests.result }}"
          echo "docker-tests: ${{ needs.docker-tests.result }}"

          if [[ "${{ needs.lint.result }}"         == "failure" ]] || \
             [[ "${{ needs.unit-tests.result }}"   == "failure" ]] || \
             [[ "${{ needs.docker-tests.result }}" == "failure" ]]; then
            echo "❌ One or more jobs failed."
            exit 1
          else
            echo "✅ All jobs passed."
          fi
