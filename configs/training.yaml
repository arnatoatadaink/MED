default:
  algorithm: "grpo"
  algorithm_kwargs:
    group_size: 8
    kl_coeff: 0.001
    clip_ratio: 0.2
    temperature: 1.0

  adapter: "tinylora"
  adapter_kwargs:
    frozen_rank: 2
    projection_dim: 4
    tie_factor: 7
    target_modules:
      - "q_proj"
      - "k_proj"
      - "v_proj"
      - "o_proj"
      - "up_proj"
      - "down_proj"
      - "gate_proj"

  reward: "composite"
  reward_kwargs:
    weights:
      correctness: 0.35
      retrieval_quality: 0.20
      exec_success: 0.20
      efficiency: 0.10
      memory_utilization: 0.15

  training:
    epochs: 3
    batch_size: 64
    learning_rate: 1.0e-4
    max_generation_length: 4096
    seeds:
      - 42
      - 123
      - 456

  student_model:
    name: "Qwen/Qwen2.5-7B-Instruct"
    inference_engine: "vllm"

  output_dir: "data/adapters"
  logs_dir: "data/training_logs"
  wandb_project: "rag-faiss-llm"

alternatives:
  ppo_lora:
    algorithm: "ppo"
    adapter: "lora"
    adapter_kwargs:
      rank: 8
    reward: "composite"

  dpo_loraxs:
    algorithm: "dpo"
    adapter: "lora_xs"
    reward: "teacher_eval"

  sft_warmup:
    algorithm: "sft"
    adapter: "lora"
    adapter_kwargs:
      rank: 4
    reward: null

  # StarPO-S: Echo Trap 対策版 GRPO
  # GRPO 崩壊（reward variance の崖）を検出したら切り替える
  starpo_s:
    algorithm: "grpo"
    algorithm_kwargs:
      clip_ratio: 0.2
      asymmetric_clip: true      # 正 advantage を強く伸ばし、負を強く抑制
      variance_filter: 0.08      # std < 0.08 のバッチをスキップ（上位約50%相当）
      entropy_coef: 0.01
    adapter: "tinylora"
    adapter_kwargs:
      frozen_rank: 2
      projection_dim: 4
      tie_factor: 7
    reward: "composite"

  # REFUEL: 長い多ターン会話特化
  # 会話ターン数が多くなるほど GRPO より優位
  refuel_tinylora:
    algorithm: "refuel"
    algorithm_kwargs:
      margin: 0.05               # reward 差が 0.05 未満のペアはスキップ
      temperature: 1.0
      clip_value: 10.0
    adapter: "tinylora"
    adapter_kwargs:
      frozen_rank: 2
      projection_dim: 4
      tie_factor: 7
    reward: "composite"

  # CURIO: 情報利得報酬付き GRPO
  # memory_utilization(0.10) を減らして curio_coef(0.08) を加算
  grpo_curio:
    algorithm: "grpo"
    algorithm_kwargs:
      clip_ratio: 0.2
      entropy_coef: 0.01
    adapter: "tinylora"
    adapter_kwargs:
      frozen_rank: 2
      projection_dim: 4
      tie_factor: 7
    reward: "composite"
    reward_kwargs:
      curio_coef: 0.08           # CURIO 情報利得報酬（内発的報酬）
      weights:
        correctness: 0.35
        retrieval_quality: 0.20
        exec_success: 0.20
        efficiency: 0.10
        memory_utilization: 0.10 # CURIO と合わせて調整（0.15→0.10）
