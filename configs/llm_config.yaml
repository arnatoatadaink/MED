budget:
  alert_threshold: 0.8
  daily_limit_usd: 10.0
  fallback_to_local: true
primary_provider: anthropic
providers:
  anthropic:
    default_model: claude-sonnet-4-20250514
    haiku_model: claude-haiku-4-5-20251001
  ollama:
    base_url: http://localhost:11434
    default_model: llama3.1:8b
  openai:
    default_model: gpt-4o
    mini_model: gpt-4o-mini
  openrouter:
    api_key_env: OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1
    default_model: nvidia/nemotron-3-nano-30b-a3b:free  # Apr10実績: 承認率65%・429ゼロ
    type: openai_compatible
    timeout: 120
    max_tokens: 4096
    requests_per_minute: 1     # デフォルト 1 RPM（全モデル共通の安全設定）
    daily_request_limit: 950   # OpenRouter 無料枠は 1000/日。50 リクエストのバッファ
    model_rate_limits:
      # Google AI Studio upstream: 429 多発。1 RPM でも不安定
      "google/gemma-4-31b-it:free": 1
      "google/gemma-4-26b-a4b-it:free": 1
      # NVIDIA (priority models)
      "nvidia/nemotron-3-super-120b-a12b:free": 1
      "nvidia/nemotron-3-nano-30b-a3b:free": 1
      "nvidia/nemotron-nano-12b-v2-vl:free": 1
      # MiniMax
      "minimax/minimax-m2.5:free": 1
task_routing:
  code_generation: sonnet
  error_analysis: sonnet
  feedback_analysis: haiku
  hyde: haiku
  query_parsing: haiku
  query_rewrite: haiku
  response_generation: sonnet
  verification: sonnet
