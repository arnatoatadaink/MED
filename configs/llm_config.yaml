budget:
  alert_threshold: 0.8
  daily_limit_usd: 10.0
  fallback_to_local: true
primary_provider: anthropic
providers:
  anthropic:
    default_model: claude-sonnet-4-20250514
    haiku_model: claude-haiku-4-5-20251001
  ollama:
    base_url: http://localhost:11434
    default_model: llama3.1:8b
  openai:
    default_model: gpt-4o
    mini_model: gpt-4o-mini
  openrouter:
    api_key_env: OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1
    default_model: nvidia/nemotron-nano-12b-v2-vl:free
    type: openai_compatible
    timeout: 120
    max_tokens: 4096
    requests_per_minute: 20
    daily_request_limit: 950   # OpenRouter 無料枠は 1000/日。50 リクエストのバッファ
task_routing:
  code_generation: sonnet
  error_analysis: sonnet
  feedback_analysis: haiku
  hyde: haiku
  query_parsing: haiku
  query_rewrite: haiku
  response_generation: sonnet
  verification: sonnet
